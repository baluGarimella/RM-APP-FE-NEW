<div class="max-width-container-overview">

<div class="meeting-nav-bar">
  <div class="nav-left">
    <button class="back-to-meetings-btn" (click)="goBackToMeetings()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M12 19l-7-7 7-7"></path>
      </svg>
      Back to Meetings
    </button>
  </div>
  <div class="nav-right">
    <span class="status-text">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 6L9 17l-5-5"></path>
      </svg>
      All suitability checks passed
    </span>
    <span class="divider">|</span>
    <span class="generation-time">Generated in 38 seconds</span>
    <span class="divider">|</span>
    <button class="export-pdf-btn" (click)="exportPDF()">Export PDF</button>
  </div>
</div>

<div class="meeting-header-content">
  
    <div>
      <h1 class="text-sm tracking-wide">
        Private Banking Client Meeting Preparation
      </h1>
      <span class="text-blue-200">Powered by Agentic AI — Personalised brief generated from portfolio, market, and CRM data</span>
    </div>
 
</div>
<div class="meeting-content">
<app-meeting-details [clientId]="clientUniqueId()" [meeting]="clientMeetingDetails()"> </app-meeting-details>
<app-overview [clientId]="clientUniqueId()"> </app-overview>
<app-client-profile [clientId]="clientUniqueId()"> </app-client-profile>
<app-performance [clientId]="clientUniqueId()" [rmId]="relationshipManagerId()"> </app-performance>
<app-summary-from-last-meeting [clientId]="clientUniqueId()"></app-summary-from-last-meeting>
<app-last-five-transactions [clientId]="clientUniqueId()"></app-last-five-transactions>
<app-personal-aspects [clientId]="clientUniqueId()"></app-personal-aspects>
<app-risk-indicators [clientId]="clientUniqueId()"></app-risk-indicators>
<app-client-constraints [clientId]="clientUniqueId()"> </app-client-constraints>
<app-market-outlook [clientId]="clientUniqueId()" [rmId]="relationshipManagerId()"></app-market-outlook>
</div>
<app-ai-recommendations [clientId]="clientUniqueId()" [rmId]="relationshipManagerId()"></app-ai-recommendations>
<app-ai-copilot></app-ai-copilot>
</div>
