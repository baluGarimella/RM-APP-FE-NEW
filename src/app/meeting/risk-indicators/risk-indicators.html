<div class="outer-box" style="background-color:ghostwhite">
    <div class="card anim-up">
      <div class="card-header">
        <h3 class="card-title-desc">Risk Indicators</h3>
      </div>
      <div class="riskIndicatorData" *ngIf="riskData">
        <div class="riskIndicatorDesc" *ngFor="let indicator of riskData">
            <span class="riskIndicatorItemLabel">
                {{ indicator.label }}: 
            </span>
            <span class="riskIndicatorItemValue">
                {{ indicator.value }}
            </span>
        </div>
      </div>
      <div *ngIf="!riskData">
        <p>Loading risk indicators...</p>
      </div>
    </div>
</div>
